name: 서울주문화센터 자동 업데이트

on:
  schedule:
    - cron: "0 21 * * 0"   # 매주 일요일 21:00 UTC = 월요일 06:00 KST
  workflow_dispatch:         # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 서울주문화센터 스크래핑 및 index.html 업데이트
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scrape_wucc.py
